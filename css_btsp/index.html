<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Bootstrappo</title>
</head>

<body>
    <h1 style="font-weight: bold;">MODELLO UNILAV ASSUNZIONE</h1>
    <div class="div-bar"></div>
    <div class="container-fluid">

        <!-- Header Menu -->
        <div class="row flex-nowrap mt-3">
            <div class="col-1 col-sm-2 col-md-2 col-lg-2 fs-s">
                DATORE DI LAVORO
            </div>
            <div class="col-1 col-sm-2 col-md-2 col-lg-2 fs-s">
                LAVORATORE
            </div>
            <div class="col-2 col-sm-2 col-md-2 col-lg-2 fs-s">
                INIZIO
            </div>
            <div class="col-2 col-sm-2 col-md-2 col-lg-2 fs-s">
                LAV.CO-OBBLIGATO
            </div>
            <div class="col-2 col-sm-2 col-md-2 col-lg-2 fs-s">
                INFO AGGIUNTIVE APPRENDISTATO RL
            </div>
            <div class="col-2 col-sm-2 col-md-2 col-lg-2 fs-s">
                DATI INVIO
            </div>
        </div>
        <hr>

        <!-- Form Container -->
        <div class="container-fluid align-items-center">

            <!-- First Row -->
            <form method="post">
                <div class="row">
                    <div class="col-xl-6 col-lg-6 col-md-6 col-sm-6">
                        <label for="nome" class="mt-3">Nome</label>
                        <input id="nome" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-6 col-sm-6">
                        <label for="cognome" class="mt-3">Cognome</label>
                        <input id="cognome" type="text" style="width: 100%;">
                    </div>

                    <!-- Second Row -->
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12">
                        <label for="cf" class="mt-3">Codice Fiscale</label>
                        <input id="cf" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-3 col-lg-3 col-md-6 col-sm-6">
                        <label for="sesso" class="mt-3">Sesso</label>
                        <input id="sesso" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-3 col-lg-3 col-md-6 col-sm-6">
                        <label for="data-nascita" class="mt-3">Data di nascita</label>
                        <input id="data-nascita" type="date" style="width: 100%;">
                    </div>

                    <!-- Third Row -->
                    <div class="col-xl-3 col-lg-3 col-md-5 col-sm-12">
                        <label for="comune-nascita" class="mt-3">Comune &#40 o stato Estero &#41 di
                            nascita</label>
                        <input id="comune-nascita" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-3 col-lg-3 col-md-3 col-sm-6">
                        <label for="cittadinanza" class="mt-3">cittadinanza</label>
                        <!-- <input id="cittadinanza" type="text" style="width: 100%;"> -->
                        <select name="cittadinanza" id="cittadinanza" style="width: 100%;">
                            <option value="it"></option>
                        </select>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-4 col-sm-6">
                        <label for="istruzione" class="mt-3">livello d&#39istruzione</label>
                        <select name="istruzione" id="istruzione" style="width: 100%;">
                            <option value="diploma"></option>
                        </select>
                    </div>

                    <!-- Fourth Row -->
                    <div class="col-xl-4 col-lg-4 col-md-4 col-sm-4">
                        <label for="comune-dom" class="mt-3">comune di domicilio</label>
                        <input id="comune-dom" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-3 col-lg-4 col-md-4 col-sm-4">
                        <label for="cap" class="mt-3">cap</label>
                        <input id="cap" type="text" style="width: 100%;">
                    </div>
                    <div class="col-xl-5 col-lg-4 col-md-4 col-sm-4">
                        <label for="indirizzo-dom" class="mt-3">indirizzo di domicilio</label>
                        <input id="indirizzo-dom" type="text" style="width: 100%;">
                    </div>
                </div>
            </form>
        </div>
</body>

</html>
