<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toboolist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">


</head>

<body>
    <header style="margin-bottom: 5px; background-color: white; height: 70px;">
        <img src="Logo.png" alt="logo ">
        <h1 style="display: inline-block; height: 100% ; vertical-align: top; font-size: 50px">
            Toboolist </h1>
    </header>
    <main class="create-gray-box">
        <div class="center-box" style="margin-top: 10px; margin-bottom: 5px;">
            <button style="background-color: #62acf3;" class="button-wt">Add Task</button>
            <button class="button-wt">Add Section</button>
        </div>
        <div class="center-box" style="margin-bottom: 10px;">
            <h3><strong>Today</strong></h3>
            <p class="be-inlineblock">Quarterly Newsletter</p>
            <button style="background-color: #62acf3;" class="button-wt">Editorial</button>

            <!-- -------------------------------------------------------------------------------------------- -->
            <h3><strong>New Task</strong></h3>
            <p class="be-inlineblock">Rectuiting blog post</p>
            <button style="background-color: #62acf3;" class="button-wt">Editorial</button><br>

            <p class="be-inlineblock">Mobile app launch</p>
            <button style="background-color: #9577dd;" class="button-wt">Q1 goals</button><br>

            <p class="be-inlineblock">Interview John H.</p>
            <button style="background-color: #7bbeaa;" class="button-wt">Rectuiting</button><br>

            <p class="be-inlineblock">Summit update to mobile storefonts</p>
            <button style="background-color: #e9ab5e;" class="button-wt">Mobile</button><br>

            <!-- -------------------------------------------------------------------------------------------- -->
            <h3><strong>Upcoming</strong></h3>
            <p class="be-inlineblock">Schedule meeting with Alex</p>

            <p class="be-inlineblock">Homepage refresh</p>
            <button style="background-color: #ca6ea1;" class="button-wt">Q1 goals</button><br>

            <p class="be-inlineblock">Interview John H.</p>
            <button style="background-color: #e9ab5e;" class="button-wt">Rectuiting</button><br>

            <p class="be-inlineblock">Summit update to mobile storefonts</p>
            <button style="background-color: #62acf3;" class="button-wt">Mobile</button><br>

        </div>
    </main>

</body>

</html>
